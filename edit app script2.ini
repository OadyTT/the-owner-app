### Deploy เป็น Web App

1. กด **Deploy** → **New Deployment**
2. เลือก Type = **Web App**
3. Execute as = **Me**
4. Who has access = **Anyone**
5. กด **Deploy**
6. **คัดลอก URL** ที่ได้ไว้ครับ จะได้ใช้ใน App.jsx

---

URL จะหน้าตาแบบนี้ครับ
